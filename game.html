<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Щоденник гри</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171d26; --panel-2:#1e2733; --line:#2a3543;
    --text:#e7edf3; --muted:#93a1b0; --faint:#5c6b7a;
    --game:#c084fc; --accent:#34d399; --gold:#d4a017;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(1200px 600px at 70% -10%, #1d1830 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; padding:32px 20px 64px; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:900px;margin:0 auto;}
  header{margin-bottom:26px;}
  .eyebrow{color:var(--game);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:12px;}
  h1{margin:6px 0 4px;font-size:30px;font-weight:700;letter-spacing:-.02em;}
  .sub{color:var(--muted);font-size:15px;}
  .xlink{color:var(--accent);font-size:13px;font-weight:600;text-decoration:none;}
  .xlink:hover{text-decoration:underline;}

  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0 26px;}
  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);
    border-radius:16px;padding:18px;position:relative;overflow:hidden;border-top:3px solid var(--game);}
  .card .k{color:var(--muted);font-size:12.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;}
  .card .v{font-size:26px;font-weight:700;margin-top:8px;letter-spacing:-.01em;}
  .card .note{color:var(--faint);font-size:12px;margin-top:4px;}
  .card .spark{position:absolute;right:14px;top:16px;font-size:20px;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:24px;}
  .panel h2{font-size:17px;margin:0 0 2px;font-weight:700;}
  .panel .desc{color:var(--muted);font-size:13px;margin:0 0 16px;}

  .vid{background:#000;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .vid video{display:block;width:100%;height:auto;max-height:520px;background:#000;}
  .vidcap{color:var(--faint);font-size:12.5px;margin-top:10px;}

  /* timeline log */
  .log{position:relative;margin:4px 0 0;padding:0;list-style:none;}
  .log:before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line);}
  .entry{position:relative;padding:0 0 20px 30px;}
  .entry:last-child{padding-bottom:0;}
  .entry .dot{position:absolute;left:2px;top:4px;width:14px;height:14px;border-radius:50%;
    background:var(--game);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--game);}
  .entry .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .entry .date{font-weight:700;font-size:15px;}
  .entry .dur{font-size:12px;color:var(--game);font-weight:700;background:rgba(192,132,252,.12);
    border:1px solid rgba(192,132,252,.3);border-radius:8px;padding:1px 8px;}
  .entry .star{font-size:13px;}
  .entry .what{color:var(--muted);font-size:14px;margin-top:5px;white-space:pre-line;}

  footer{color:var(--faint);font-size:12px;text-align:center;margin-top:30px;}
  @media(max-width:560px){.cards{grid-template-columns:1fr;}h1{font-size:24px;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">🎮 Гра · журнал</div>
    <h1>Щоденник гри</h1>
    <div class="sub">Що зроблено в грі — дата й робота, по днях.
      &nbsp;<a class="xlink" href="projects.html">← проєкти</a>
      &nbsp;·&nbsp;<a class="xlink" href="index.html">навчальний дашборд</a></div>
  </header>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <h2>Відео</h2>
    <p class="desc">Поточний стан гри.</p>
    <div class="vid">
      <video controls preload="metadata" playsinline>
        <source src="game.mp4" type="video/mp4" />
        Твій браузер не показує це відео — відкрий файл game.mp4 напряму.
      </video>
    </div>
    <div class="vidcap">game.mp4</div>
  </div>

  <div class="panel">
    <h2>Журнал</h2>
    <p class="desc">Один запис на сесію: дата + що зроблено. Нове зверху.</p>
    <ul class="log" id="log"></ul>
  </div>

  <footer id="foot"></footer>
</div>

<script>
/* ================= GAME LOG — add one row per game session ================= */
/* Нове додавай ЗВЕРХУ. min = хвилини сесії. star:true = слот-зірка (⭐) на дашборді проєктів. */
const GAMELOG = [
  { date:"2026-07-11", min:120, star:true,
    what:"Робота над грою — сесія 2 год (бонусний слот у суботу). Деталі допиши: що саме зробив." },
  { date:"2026-07-09", min:120, star:true,
    what:"Рекордна сесія — 2 год, найбільший слот. Робота над локацією (центр кімнати, щоб по ній можна було походити)." },
  { date:"2026-07-06", min:75, star:true,
    what:"Перший слот гри за EXP-006 — 75 хв." },
];
const UPDATED = "2026-07-11";
/* ========================================================================== */

const fmtMin = m => m>=60 ? Math.floor(m/60)+" год"+(m%60? " "+(m%60)+" хв":"") : m+" хв";
const DAYN = ["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
const fmtDate = iso => {
  const d = new Date(iso+"T00:00:00");
  return iso.slice(8)+"."+iso.slice(5,7)+"."+iso.slice(0,4)+" · "+DAYN[d.getDay()];
};

const totalMin = GAMELOG.reduce((s,e)=>s+e.min,0);
const sessions = GAMELOG.length;
const stars    = GAMELOG.filter(e=>e.star).length;

const cards = [
  { k:"Час у грі", v:fmtMin(totalMin), note:"разом за всі сесії", spark:"⏱️" },
  { k:"Сесій", v:sessions, note:"днів роботи над грою", spark:"📅" },
  { k:"Зірки гри", v:"⭐ "+stars, note:"виконані слоти", spark:"🎮" },
];
document.getElementById("cards").innerHTML = cards.map(c=>`
  <div class="card"><div class="spark">${c.spark}</div>
    <div class="k">${c.k}</div><div class="v">${c.v}</div><div class="note">${c.note}</div></div>`).join("");

document.getElementById("log").innerHTML = GAMELOG.map(e=>`
  <li class="entry">
    <span class="dot"></span>
    <div class="top">
      <span class="date">${fmtDate(e.date)}</span>
      <span class="dur">${fmtMin(e.min)}</span>
      ${e.star?'<span class="star">⭐</span>':''}
    </div>
    <div class="what">${e.what}</div>
  </li>`).join("");

document.getElementById("foot").textContent =
  `Ціль гри: готова локація (центр кімнати), по якій можна походити · оновлено ${UPDATED}`;
</script>
</body>
</html>
